AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: BIBLIOnomics Enrichment Backend

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref EnrichmentRequestsTable
        INPUT_BUCKET: !Ref InputBucket
        OUTPUT_BUCKET: !Ref OutputBucket

Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  ApiKey:
    Type: String
    NoEcho: true
    Description: API key value that clients must send in the x-api-key header

Resources:

  # ── S3 Buckets ──────────────────────────────────────────────────────────────

  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "biblionomics-enrichment-input-${Env}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedHeaders: ["*"]
            MaxAge: 3000

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "biblionomics-enrichment-output-${Env}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET]
            AllowedHeaders: ["*"]
            MaxAge: 3000

  # ── DynamoDB ─────────────────────────────────────────────────────────────────

  EnrichmentRequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "enrichment-requests-${Env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: requestId
          AttributeType: S
      KeySchema:
        - AttributeName: requestId
          KeyType: HASH

  # ── IAM Role (shared) ────────────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "biblionomics-lambda-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BiblionomicsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource: !GetAtt EnrichmentRequestsTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:HeadObject
                Resource:
                  - !Sub "arn:aws:s3:::biblionomics-enrichment-input-${Env}/*"
                  - !Sub "arn:aws:s3:::biblionomics-enrichment-output-${Env}/*"

  # ── Lambda Authorizer ────────────────────────────────────────────────────────

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "biblionomics-authorizer-${Env}"
      CodeUri: lambdas/authorizer/
      Handler: authorizer.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          API_KEY: !Ref ApiKey

  # ── Lambda Functions ─────────────────────────────────────────────────────────

  JobStarterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "biblionomics-job-starter-${Env}"
      CodeUri: lambdas/job_starter/
      Handler: job_starter.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        PostJobsBegin:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblionomicsApi
            Path: /jobs/begin
            Method: POST

  GetStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "biblionomics-get-status-${Env}"
      CodeUri: lambdas/get_status/
      Handler: get_status.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetJobsStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblionomicsApi
            Path: /jobs/status
            Method: GET

  GenerateDownloadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "biblionomics-generate-download-${Env}"
      CodeUri: lambdas/generate_download/
      Handler: generate_download.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetGenerateDownload:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblionomicsApi
            Path: /jobs/generate-download
            Method: GET

  # ── API Gateway (HTTP API v2) ───────────────────────────────────────────────────────────────

  BiblionomicsApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Env
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - x-api-key
        MaxAge: 86400
      Auth:
        DefaultAuthorizer: ApiKeyAuthorizer
        Authorizers:
          ApiKeyAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionInvokeRole: !GetAtt AuthorizerInvokeRole.Arn
            Identity:
              Headers:
                - x-api-key
            AuthorizerPayloadFormatVersion: "2.0"
            EnableSimpleResponses: true

  # ── Frontend Hosting ──────────────────────────────────────────────────────────

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "biblionomics-frontend-${Env}"

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "biblionomics-oac-${Env}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: s3-origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt FrontendOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponsePagePath: /index.html
            ResponseCode: "200"
            ErrorCachingMinTTL: 0

  AuthorizerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "biblionomics-authorizer-invoke-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeAuthorizer
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt AuthorizerFunction.Arn

Outputs:
  ApiUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${BiblionomicsApi}.execute-api.${AWS::Region}.amazonaws.com/${Env}"

  InputBucketName:
    Value: !Ref InputBucket

  OutputBucketName:
    Value: !Ref OutputBucket

  DynamoDBTableName:
    Value: !Ref EnrichmentRequestsTable

  FrontendBucketName:
    Value: !Ref FrontendBucket

  FrontendUrl:
    Description: CloudFront URL for the frontend
    Value: !Sub "https://${FrontendDistribution.DomainName}"

  FrontendDistributionId:
    Value: !Ref FrontendDistribution